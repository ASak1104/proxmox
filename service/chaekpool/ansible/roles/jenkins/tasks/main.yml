---
# --- Docker for Testcontainers ---
# docker GID는 apk install 전에 명시적으로 생성 — 설치 후 GID 변경은
# 모든 docker 소유 파일/소켓 권한이 어긋나 위험.
- name: Pin docker group GID before apk install
  ansible.builtin.group:
    name: docker
    gid: "{{ docker_gid }}"
    system: true

- name: Install Docker
  ansible.builtin.apk:
    name:
      - docker
      - docker-cli-compose
    state: present
    update_cache: true

- name: Enable Docker at boot
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Install Java, Git and fonts
  ansible.builtin.apk:
    name:
      - openjdk21
      - git
      - fontconfig
      - freetype
      - ttf-dejavu
    state: present

- name: Create jenkins user
  ansible.builtin.include_role:
    name: common
    tasks_from: service_user
  vars:
    svc_name: jenkins
    svc_uid: "{{ jenkins_uid }}"
    svc_gid: "{{ jenkins_gid }}"
    svc_home: "{{ jenkins_home }}"
    svc_dirs:
      - "{{ jenkins_home }}"
      - "{{ jenkins_opt }}"
      - "{{ jenkins_log_dir }}"

- name: Add jenkins user to docker group
  ansible.builtin.user:
    name: jenkins
    groups: docker
    append: true
  notify: restart jenkins

- name: Record desired Jenkins version
  ansible.builtin.copy:
    content: "{{ jenkins_version }}"
    dest: "{{ jenkins_opt }}/.version"
    owner: jenkins
    group: jenkins
    mode: "0644"
  register: _jenkins_version_changed

- name: Remove old Jenkins WAR on version change
  ansible.builtin.file:
    path: "{{ jenkins_opt }}/jenkins.war"
    state: absent
  when: _jenkins_version_changed is changed

- name: Download Jenkins WAR
  ansible.builtin.get_url:
    url: "https://get.jenkins.io/war-stable/{{ jenkins_version }}/jenkins.war"
    dest: "{{ jenkins_opt }}/jenkins.war"
    owner: jenkins
    group: jenkins
    mode: "0644"
  notify: restart jenkins

- name: Download plugin manager
  ansible.builtin.get_url:
    url: "https://github.com/jenkinsci/plugin-installation-manager-tool/releases/download/{{ jenkins_plugin_manager_version }}/jenkins-plugin-manager-{{ jenkins_plugin_manager_version }}.jar"
    dest: /tmp/jenkins-plugin-manager.jar
    mode: "0644"

- name: Install plugins
  ansible.builtin.command:
    cmd: >
      java -jar /tmp/jenkins-plugin-manager.jar
      -w {{ jenkins_opt }}/jenkins.war
      -d {{ jenkins_home }}/plugins
      -p oic-auth configuration-as-code
      workflow-aggregator docker-workflow git
      credentials-binding ssh-agent
      pipeline-stage-view timestamper
      job-dsl junit ws-cleanup ssh-slaves
  changed_when: true
  notify: restart jenkins

- name: Set plugin directory ownership
  ansible.builtin.file:
    path: "{{ jenkins_home }}/plugins"
    state: directory
    owner: jenkins
    group: jenkins
    recurse: true

- name: Clean up plugin manager
  ansible.builtin.file:
    path: /tmp/jenkins-plugin-manager.jar
    state: absent

- name: Deploy jenkins wrapper script
  ansible.builtin.template:
    src: jenkins-wrapper.sh.j2
    dest: "{{ jenkins_opt }}/jenkins-wrapper.sh"
    owner: jenkins
    group: jenkins
    mode: "0755"
  notify: restart jenkins

- name: Deploy Jenkins OpenRC service
  ansible.builtin.include_role:
    name: common
    tasks_from: openrc_service
  vars:
    openrc_name: jenkins
    openrc_src: jenkins.openrc

# --- Jenkins Agent (SSH localhost) ---
# Alpine nocloud 이미지의 cloud-init 기본 유저(alpine, UID 1000)는 사용하지
# 않으며 jenkins-agent UID 1000과 충돌하므로 제거. 호스트 SSH는 root 키 기반.
- name: Remove unused alpine cloud-init user
  ansible.builtin.user:
    name: alpine
    state: absent
    remove: true
    force: true

- name: Remove alpine group
  ansible.builtin.group:
    name: alpine
    state: absent

- name: Create jenkins-agent group
  ansible.builtin.group:
    name: jenkins-agent
    gid: "{{ jenkins_agent_gid }}"
    system: true

- name: Create jenkins-agent user
  ansible.builtin.user:
    name: jenkins-agent
    uid: "{{ jenkins_agent_uid }}"
    group: jenkins-agent
    groups: docker
    system: true
    create_home: true
    home: /var/lib/jenkins-agent
    shell: /bin/ash
    password: "*"

# chaekpool-api ci/Jenkinsfile docker agent args(`-u 1000:1000 --group-add 104`)와
# 정합성 검증. 값이 달라지면 다음 빌드가 워크스페이스 chmod EPERM으로 실패함.
- name: Lookup jenkins-agent UID
  ansible.builtin.getent:
    database: passwd
    key: jenkins-agent

- name: Lookup docker GID
  ansible.builtin.getent:
    database: group
    key: docker

- name: Assert UID/GID match Jenkinsfile assumptions
  ansible.builtin.assert:
    that:
      - getent_passwd['jenkins-agent'][1] | int == jenkins_agent_uid
      - getent_passwd['jenkins-agent'][2] | int == jenkins_agent_gid
      - getent_group['docker'][1] | int == docker_gid
    fail_msg: >-
      UID/GID 불일치 — chaekpool-api Jenkinsfile/Dockerfile의 docker agent
      args(`-u`, `--group-add`)와 ARG 값 동기화 필요.
      jenkins-agent UID={{ getent_passwd['jenkins-agent'][1] }} (기대: {{ jenkins_agent_uid }}),
      jenkins-agent GID={{ getent_passwd['jenkins-agent'][2] }} (기대: {{ jenkins_agent_gid }}),
      docker GID={{ getent_group['docker'][1] }} (기대: {{ docker_gid }})

# --- Gradle cache for Docker Pipeline (mounted into Docker agent) ---
- name: Create Gradle cache directory for jenkins-agent
  ansible.builtin.file:
    path: /var/lib/jenkins-agent/.gradle
    state: directory
    owner: jenkins-agent
    group: jenkins-agent
    mode: "0755"

- name: Generate SSH keypair for jenkins agent
  ansible.builtin.user:
    name: jenkins
    generate_ssh_key: true
    ssh_key_type: ed25519
    ssh_key_comment: "jenkins-agent@localhost"

- name: Read jenkins public key
  ansible.builtin.slurp:
    src: "{{ jenkins_home }}/.ssh/id_ed25519.pub"
  register: _jenkins_agent_pubkey

- name: Create jenkins-agent .ssh directory
  ansible.builtin.file:
    path: /var/lib/jenkins-agent/.ssh
    state: directory
    owner: jenkins-agent
    group: jenkins-agent
    mode: "0700"

- name: Authorize jenkins key for jenkins-agent user
  ansible.builtin.copy:
    content: "{{ _jenkins_agent_pubkey.content | b64decode }}"
    dest: /var/lib/jenkins-agent/.ssh/authorized_keys
    owner: jenkins-agent
    group: jenkins-agent
    mode: "0600"

- name: Read jenkins private key for JCasC credential
  ansible.builtin.slurp:
    src: "{{ jenkins_home }}/.ssh/id_ed25519"
  register: _jenkins_agent_privkey

- name: Deploy JCasC config
  ansible.builtin.template:
    src: casc.yaml.j2
    dest: "{{ jenkins_home }}/casc.yaml"
    owner: jenkins
    group: jenkins
    mode: "0600"
  notify: restart jenkins
